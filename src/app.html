				scroll-behavior: smooth;
				overflow-x: clip;
			}
			body {

				overflow-x: clip;
				background: #070506;
				color: #f5eef0;
				font-family: system-ui, -apple-system, Segoe UI, sans-serif;
				-webkit-font-smoothing: antialiased;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
